<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NutriSafe</title>
    <link rel="stylesheet" href="style.css">
    <!-- Enllaços per convertir la web en App (PWA) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
   <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

    <h1>NutriSafe</h1>
    <p>Your personalized allergen-free meal planner</p>

    <section id="settings">
        <h2>1. Select Your Intolerances</h2>
        <div class="checkbox-group">
            <label><input type="checkbox" id="gluten" value="gluten"> Gluten-Free</label>
            <label><input type="checkbox" id="lactose" value="lactose"> Lactose-Free</label>
            <label><input type="checkbox" id="nuts" value="nuts"> Nut-Free</label>
        </div>
    </section>

    <section id="planner">
        <h2>2. Weekly Menu</h2>
        <div id="calendar-grid"></div>
    </section>

    <section id="shopping-list">
        <h2>3. Smart Shopping List</h2>
        <ul id="list-container"></ul>
    </section>

    <script src="app.js"></script>
</body>
</html>
