<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSafe - Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>NutriSafe</h1>
        <p>Your personalized allergen-free meal planner</p>
    </header>

    <main>
        <!-- Onboarding / Settings Section -->
        <section id="settings">
            <h2>1. Select Your Intolerances</h2>
            <div class="checkbox-group">
                <label><input type="checkbox" id="gluten" value="gluten"> Gluten-Free</label>
                <label><input type="checkbox" id="lactose" value="lactose"> Lactose-Free</label>
                <label><input type="checkbox" id="nuts" value="nuts"> Nut-Free</label>
            </div>
        </section>

        <!-- Weekly Planner Section -->
        <section id="planner">
            <h2>2. Weekly Menu</h2>
            <div id="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </section>

        <!-- Shopping List Section -->
        <section id="shopping-list">
            <h2>3. Smart Shopping List</h2>
            <ul id="list-container">
                <!-- Items will be generated by JS -->
            </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
